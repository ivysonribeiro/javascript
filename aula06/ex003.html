<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu primeiro programa</title>
    <style>
        body{
            background-color: rgba(0, 0, 255, 0.719);
            font: normal 20pt arial;
            color: white;
        }

        h1{
            color: rgba(255, 255, 0, 0.959);
        }
    </style>
</head>
<body>
    <h1>Olá, Mundo!</h1>
    <p>Pronto. Já me livrei da maldição!</p>
</body>

<script>
    var n1 = Number(window.prompt('Digite um número:'))//string
    var n2 = Number(window.prompt('Digite outro número:'))//string
    var s = n1 + n2
    window.alert(`A soma entre ${n1} e ${n2} é igual a ${s}`)//concatenação
    //(number + number) para adição
    //(string + string) para concatenação

</script>
</html>
